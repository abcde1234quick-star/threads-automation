name: Threads 週次ジョブ（リサーチ＋投稿生成）

on:
  schedule:
    - cron: "0 22 * * 0"    # 月曜 07:00 JST（日曜 22:00 UTC）— 定期生成
    - cron: "0 15 * * *"    # 毎日 00:00 JST（15:00 UTC）— キュー補充チェック
  workflow_dispatch:

concurrency:
  group: threads-weekly
  cancel-in-progress: false  # 実行中のジョブを中断しない（ファイル破損防止）

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check queue count
        id: queue_check
        run: |
          COUNT=$(python -c "
          import sys; sys.path.insert(0, 'scripts')
          from utils import parse_queue
          print(len(parse_queue()))
          ")
          echo "queued=$COUNT" >> $GITHUB_OUTPUT
          echo "キュー残り: ${COUNT}件"

      - name: Analyze performance before generation
        # 生成前に最新の分析を実行して performance_summary.md を更新する
        # キュー補充が必要な場合（≤5件）・月曜定期・手動実行のすべてで走らせる
        if: ${{ github.event.schedule == '0 22 * * 0' || github.event_name == 'workflow_dispatch' || fromJson(steps.queue_check.outputs.queued) <= 5 }}
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          echo "=== 投稿生成前に分析を実行 ==="
          python scripts/fetch_metrics.py || echo "[WARN] fetch_metrics.py 失敗（分析は続行）"
          python scripts/analyze_performance.py

      - name: Run weekly job
        # 月曜定期 or キューが5件以下のときだけ実行
        if: ${{ github.event.schedule == '0 22 * * 0' || github.event_name == 'workflow_dispatch' || fromJson(steps.queue_check.outputs.queued) <= 5 }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
        run: |
          echo "投稿生成を実行します（キュー残り: ${{ steps.queue_check.outputs.queued }}件）"
          python scripts/weekly_job.py

      - name: Commit & push changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "変更なし（スキップ）" && exit 0
          git commit -m "weekly: 分析→投稿生成 $(TZ='Asia/Tokyo' date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
