name: Threads 週次ジョブ（リサーチ＋投稿生成）

on:
  schedule:
    - cron: "0 22 * * 0"   # 月曜 07:00 JST（日曜 22:00 UTC）
  workflow_dispatch:        # 手動実行も可能

concurrency:
  group: threads-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run weekly job
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/weekly_job.py

      - name: Commit & push changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "weekly: 投稿生成 $(TZ='Asia/Tokyo' date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
