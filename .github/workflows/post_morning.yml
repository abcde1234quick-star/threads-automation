name: Threads 投稿 朝（08:00±30分）

on:
  schedule:
    - cron: "30 22 * * *"   # 07:30 JST（前日 22:30 UTC）→ 0〜60分遅延で 07:30〜08:30 JST に投稿

concurrency:
  group: threads-morning
  cancel-in-progress: true   # 万一2重起動したら即キャンセル

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Post one item
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          SLOT: morning
        run: python scripts/post_one.py

      - name: Commit & push changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "変更なし（スキップ判定）" && exit 0
          git commit -m "auto: post $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST') [morning]"
          git pull --rebase origin main
          git push origin main
