name: Threads 投稿（朝1回・夜2回）

on:
  schedule:
    # ── 朝セッション 8:00〜9:30 JST（3スロット）──────────────
    - cron: "7 23 * * *"    # 08:07 JST（前日 23:07 UTC）
    - cron: "43 23 * * *"   # 08:43 JST（前日 23:43 UTC）
    - cron: "19 0 * * *"    # 09:19 JST（00:19 UTC）
    # ── 夜セッション 18:00〜26:00 JST（6スロット）──────────────
    - cron: "23 9 * * *"    # 18:23 JST（09:23 UTC）
    - cron: "51 10 * * *"   # 19:51 JST（10:51 UTC）
    - cron: "17 12 * * *"   # 21:17 JST（12:17 UTC）
    - cron: "44 13 * * *"   # 22:44 JST（13:44 UTC）
    - cron: "8 15 * * *"    # 00:08 JST（15:08 UTC）
    - cron: "36 16 * * *"   # 01:36 JST（16:36 UTC）
  workflow_dispatch:

# 同時実行を防ぐ（キューの競合防止）
concurrency:
  group: threads-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Post one item
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python scripts/post_one.py

      - name: Check queue count
        id: queue_check
        run: |
          COUNT=$(python -c "
          text = open('data/post_queue.md', encoding='utf-8').read()
          print(text.count('status: queued'))
          ")
          echo "queued=$COUNT" >> $GITHUB_OUTPUT
          echo "キュー残り: ${COUNT}件"

      - name: Auto-generate posts if queue <= 5
        if: ${{ fromJson(steps.queue_check.outputs.queued) <= 5 }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "キューが5件以下のため投稿を自動生成します..."
          python scripts/weekly_job.py

      - name: Commit & push changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "変更なし（スキップ判定）" && exit 0
          git commit -m "auto: post $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')"
          git pull --rebase origin main
          git push origin main
