name: Threads メトリクス取得 & パフォーマンス分析（月・木 23:00 JST）

on:
  schedule:
    - cron: "0 14 * * 1"   # 月曜 23:00 JST（14:00 UTC）
    - cron: "0 14 * * 4"   # 木曜 23:00 JST（14:00 UTC）
  workflow_dispatch:

concurrency:
  group: threads-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt   # requirements.txt で統一

      - name: Fetch metrics
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python scripts/fetch_metrics.py
        continue-on-error: true  
        
      - name: Analyze performance
        # fetch_metrics.py が成功・失敗にかかわらず分析は常に実行
        if: always()
        run: python scripts/analyze_performance.py
    - name: Rewrite queue with insights
    if: always()
    env:
    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/rewrite_queue.py

      - name: Commit & push changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "metrics: $(TZ='Asia/Tokyo' date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
